<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bailey Rider — CS Word Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:#87CEEB;overflow:hidden;height:100vh;width:100vw;user-select:none;}
  canvas{display:block;position:absolute;top:0;left:0;}
  #overlay{position:fixed;inset:0;background:rgba(0,0,35,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:13px;}
  #overlay h1{font-family:'Fredoka One',cursive;font-size:clamp(2rem,6vw,4rem);color:#FFD700;text-shadow:0 2px 12px rgba(255,215,0,0.6);}
  #overlay p{color:#aad4ff;font-size:1rem;text-align:center;max-width:430px;line-height:1.6;}
  .btn{background:#FFD700;color:#003399;border:none;padding:13px 38px;font-family:'Fredoka One',cursive;font-size:1.35rem;border-radius:50px;cursor:pointer;box-shadow:0 4px 18px rgba(255,215,0,0.5);transition:transform .1s,box-shadow .1s;}
  .btn:hover{transform:scale(1.06);box-shadow:0 6px 24px rgba(255,215,0,0.7);}
  #level-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(0,0,35,0.96);border:4px solid #FFD700;border-radius:20px;padding:26px 48px;text-align:center;z-index:300;transition:transform .38s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
  #level-banner.show{transform:translate(-50%,-50%) scale(1);}
  #level-banner h2{font-family:'Fredoka One',cursive;font-size:2.3rem;color:#FFD700;}
  #level-banner p{color:#aad4ff;font-size:.98rem;margin-top:6px;}
  #controls-hint{position:fixed;bottom:7px;right:11px;color:rgba(255,255,255,0.4);font-size:.7rem;z-index:50;text-align:right;pointer-events:none;}
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="overlay">
  <h1>🚲 Bailey Rider</h1>
  <p>Steer through the <strong>correct answer</strong>. Avoid the wrong ones!<br>
  Jump onto <strong>platforms</strong> to dodge obstacles.</p>
  <p style="font-size:.84rem;color:#88aacc;">← → Arrow keys / A D &nbsp;|&nbsp; <strong>Space / W / ↑</strong> to jump<br>Mobile: tap left / right / top of screen</p>
  <button class="btn" id="start-btn">Start Riding!</button>
</div>

<div id="level-banner">
  <h2 id="banner-title">🏁 LEVEL 2!</h2>
  <p id="banner-sub">Speed up — tougher questions!</p>
</div>

<div id="controls-hint">← → move &nbsp;|&nbsp; Space/↑ jump &nbsp;|&nbsp; tap sides/top</div>

// ══════════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════════
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const levelBanner = document.getElementById('level-banner');
const bannerTitle = document.getElementById('banner-title');
const bannerSub   = document.getElementById('banner-sub');

let W, H, ROAD_Y, ROAD_H, LANE_W;
const UI_H = 115;
const LANE_COUNT = 3;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  ROAD_H = Math.min(170, H * 0.29);
  ROAD_Y = H - ROAD_H - 20;
  LANE_W = W / LANE_COUNT;
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════
let gameState = 'idle';
let score = 0, streak = 0, lives = 3;
let levelIdx = 0;          // 0–9
let correctInLevel = 0;    // correct answers in current level
const ANSWERS_PER_LEVEL = 5; // correct answers needed to advance

let currentQ = null, answerWords = [];
let wordSlots = [];
let spawnTimer = 0;

// Bike physics
const GRAVITY      = 0.55;
const JUMP_VEL     = -14;
const COYOTE_TIME  = 10;   // frames of grace after leaving a surface
const JUMP_BUFFER  = 8;    // frames to remember a jump press before landing

let bike = { visualX:0, y:0, velY:0, tilt:0, onGround:true };
let coyoteTimer = 0;
let jumpBuffer  = 0;
let currentLane = 1;
let laneCD = 0;

// Platforms
let platforms = [];
let platTimer = 0;
// Platform is wide (almost full lane width) and only one fixed height above road
const PLAT_H         = 18;
const PLAT_RISE      = 70;  // fixed px above road centre — low enough to reach easily
const PLAT_WIDTH_FRAC = 0.82; // fraction of lane width

// Visuals
let roadOffset = 0, bgOffset = 0;
let feedbacks = [], clouds = [], trees = [];
let frameCount = 0;
let keys = { left:false, right:false, jump:false };
let jumpQueued = false;
let shakeAmt = 0;
let levelTransitioning = false;
let animId;

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
function cfg(){ return LEVEL_CONFIG[levelIdx]; }

function levelBaseSpeed(){
  // Starts slow, climbs steadily
  return 1.6 + levelIdx * 0.35;
}
function spawnInterval(){
  return Math.max(90, 170 - levelIdx * 9);
}
function platInterval(){
  return Math.max(110, 230 - levelIdx * 12);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function initGame(){
  score=0; streak=0; lives=3; levelIdx=0; correctInLevel=0;
  wordSlots=[]; feedbacks=[]; frameCount=0;
  spawnTimer=0; platTimer=0; bgOffset=0; roadOffset=0;
  platforms=[]; levelTransitioning=false;
  currentLane=1; laneCD=0;
  bike={visualX:W/2, y:0, velY:0, tilt:0, onGround:true};
  coyoteTimer=0; jumpBuffer=0;
  buildScenery();
  pickQuestion();
}

function buildScenery(){
  clouds = Array.from({length:5},()=>({
    x: Math.random()*W, y: 20+Math.random()*(ROAD_Y*.45),
    w: 80+Math.random()*100, speed:.3+Math.random()*.4
  }));
  trees = Array.from({length:8},(_,i)=>({
    x: i*(W/4)+Math.random()*(W/4), y:ROAD_Y-10, h:40+Math.random()*30
  }));
}

function pickQuestion(){
  const qs = cfg().questions;
  currentQ = qs[Math.floor(Math.random()*qs.length)];
  const wrong = [...currentQ.w].sort(()=>Math.random()-.5).slice(0,2);
  answerWords = shuffle([currentQ.a, ...wrong]);
}

function setupWordSlots(){
  wordSlots = answerWords.map((word,i)=>({
    lane:i, label:word, isCorrect:word===currentQ.a,
    hit:false, hitTimer:0,
    y:-(ROAD_H+30)
  }));
}

// ══════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
    e.preventDefault(); keys.jump=true; jumpQueued=true;
  }
});
document.addEventListener('keyup', e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W') keys.jump=false;
});
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const tx=e.touches[0].clientX, ty=e.touches[0].clientY;
  if(ty < H*0.28){ jumpQueued=true; keys.jump=true; }
  else if(tx < W/2) keys.left=true;
  else keys.right=true;
},{passive:false});
canvas.addEventListener('touchend', e=>{ keys.left=false; keys.right=false; keys.jump=false; },{passive:false});

document.getElementById('start-btn').addEventListener('click', startGame);

// ══════════════════════════════════════════════
// LEVEL TRANSITION
// ══════════════════════════════════════════════
function triggerLevelUp(){
  if(levelTransitioning) return;
  levelIdx++;
  correctInLevel=0;
  levelTransitioning=true;
  wordSlots=[];
  platforms=[];
  spawnTimer=0; platTimer=0;

  const c = cfg();
  bannerTitle.textContent = c.name;
  bannerSub.textContent   = levelIdx===9 ? '⚠️ Maximum difficulty — good luck!'
    : 'Speed +' + (levelIdx) + ' — ' + c.questions.length + ' new questions!';
  levelBanner.classList.add('show');
  setTimeout(()=>{ levelBanner.classList.remove('show'); levelTransitioning=false; pickQuestion(); }, 2600);
}

// ══════════════════════════════════════════════
// LOOP
// ══════════════════════════════════════════════
function startGame(){
  overlay.style.display='none';
  gameState='playing';
  initGame();
  if(animId) cancelAnimationFrame(animId);
  loop();
}
function loop(){
  if(gameState!=='playing') return;
  update(); draw();
  animId=requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════
function update(){
  if(levelTransitioning){ frameCount++; scrollBg(); return; }

  frameCount++;
  scrollBg();

  // ── LANE MOVE ──
  if(laneCD>0) laneCD--;
  if(keys.left  && laneCD===0 && currentLane>0){ currentLane--; laneCD=16; bike.tilt=-0.32; }
  if(keys.right && laneCD===0 && currentLane<2){ currentLane++; laneCD=16; bike.tilt= 0.32; }
  bike.visualX += ((currentLane+.5)*LANE_W - bike.visualX) * 0.13;
  bike.tilt *= 0.87;

  // ── JUMP BUFFER ──
  if(jumpQueued){ jumpBuffer=JUMP_BUFFER; jumpQueued=false; }
  if(jumpBuffer>0) jumpBuffer--;

  // ── GRAVITY ──
  bike.velY += GRAVITY;
  bike.y    += bike.velY;

  // ── GROUND ──
  if(bike.y >= 0){
    bike.y=0; bike.velY=0; bike.onGround=true; coyoteTimer=COYOTE_TIME;
  } else {
    bike.onGround=false;
    if(coyoteTimer>0) coyoteTimer--;
  }

  // ── PLATFORMS ──
  platTimer++;
  if(platTimer >= platInterval()){
    platTimer=0; spawnPlatform();
  }
  const pSpeed = levelBaseSpeed() * 1.05;
  platforms.forEach(p=>{ p.x -= pSpeed; });
  platforms = platforms.filter(p=>p.x+p.w>-30);

  // Platform landing — generous: check wide x range, generous y window
  if(bike.velY >= 0){
    platforms.forEach(p=>{
      const platTop = p.screenY;          // screen Y of top surface
      const bikeBottom = (ROAD_Y + ROAD_H*0.5 + bike.y); // screen Y of bike base
      const prevBikeBottom = bikeBottom - bike.velY;

      const onX = bike.visualX > p.x + 10 && bike.visualX < p.x + p.w - 10;
      // generous vertical window: 20px above platform top
      const crossedTop = prevBikeBottom <= platTop+4 && bikeBottom >= platTop-20;

      if(onX && crossedTop){
        // Snap to platform
        bike.y   = platTop - (ROAD_Y + ROAD_H*0.5);
        bike.velY= 0;
        coyoteTimer = COYOTE_TIME;
      }
    });
  }

  // ── JUMP EXECUTION (with coyote time + buffer) ──
  if(jumpBuffer>0 && coyoteTimer>0){
    bike.velY   = JUMP_VEL;
    coyoteTimer = 0;
    jumpBuffer  = 0;
  }

  // ── SPAWN WORDS ──
  spawnTimer++;
  if(spawnTimer >= spawnInterval() && wordSlots.length===0){
    spawnTimer=0; setupWordSlots();
  }

  const wSpeed = levelBaseSpeed() + score*0.008;
  wordSlots.forEach(ws=>{ if(!ws.hit) ws.y+=wSpeed; else ws.hitTimer++; });

  // ── COLLISION ──
  const bikeScreenY = ROAD_Y + ROAD_H*0.5 + bike.y;
  wordSlots.forEach(ws=>{
    if(ws.hit) return;
    const wX=(ws.lane+.5)*LANE_W, wY=ROAD_Y+ws.y;
    if(Math.abs(bike.visualX-wX)<LANE_W*.42 && Math.abs(bikeScreenY-wY)<46){
      ws.hit=true;
      if(ws.isCorrect){
        score += 10+streak*2; streak++; correctInLevel++;
        feedbacks.push({x:wX,y:wY-22,text:`+${10+(streak-1)*2} ✓`,color:'#00e676',life:60});
        if(streak%3===0) feedbacks.push({x:W/2,y:H*.3,text:`🔥 x${streak} Streak!`,color:'#FFD700',life:80});
        if(correctInLevel >= ANSWERS_PER_LEVEL && levelIdx<9) triggerLevelUp();
        else { pickQuestion(); wordSlots=[]; spawnTimer=0; }
      } else {
        lives--; streak=0;
        feedbacks.push({x:wX,y:wY-22,text:'WRONG! -1 ❤️',color:'#ff1744',life:70});
        shakeAmt=10;
        if(lives<=0){ gameState='gameover'; showGameOver(); return; }
        wordSlots=wordSlots.filter(w=>!w.hit);
      }
    }
  });
  wordSlots=wordSlots.filter(ws=>{
    if(ws.hitTimer>30) return false;
    if(!ws.hit && ROAD_Y+ws.y>H+80) return false;
    return true;
  });

  feedbacks.forEach(f=>{ f.y-=1.2; f.life--; });
  feedbacks=feedbacks.filter(f=>f.life>0);
}

function scrollBg(){
  bgOffset+=1.5;
  const s=levelBaseSpeed();
  roadOffset=(roadOffset+s*1.4)%80;
  clouds.forEach(c=>{ c.x-=c.speed*(1+levelIdx*.08); if(c.x<-c.w) c.x=W+c.w; });
}

function spawnPlatform(){
  const lane=Math.floor(Math.random()*3);
  const pw = LANE_W * PLAT_WIDTH_FRAC;
  const lx = lane * LANE_W + (LANE_W-pw)/2;
  // Fixed height above road centre — easy to reach
  const platTop = ROAD_Y + ROAD_H*0.5 - PLAT_RISE;
  platforms.push({ x:W+20, w:pw, screenY:platTop, lane, color:cfg().platCol });
}

// ══════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════
function draw(){
  const c=cfg();
  ctx.save();
  if(shakeAmt>0){
    ctx.translate(Math.random()*shakeAmt-shakeAmt/2, Math.random()*shakeAmt-shakeAmt/2);
    shakeAmt*=.72;
  }

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,ROAD_Y);
  sky.addColorStop(0,c.sky1); sky.addColorStop(1,c.sky2);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,ROAD_Y);

  // Stars
  if(c.stars){
    ctx.fillStyle='rgba(255,255,255,0.85)';
    for(let i=0;i<50;i++){
      const sx=((i*137+bgOffset*.25)%W), sy=((i*79)%(ROAD_Y*.85));
      const r=(i%4===0)?1.8:.9;
      ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
    }
  }

  // Sun/Moon
  ctx.save();
  ctx.shadowBlur=28; ctx.shadowColor=c.stars?'#aaddff':'#FFE680';
  ctx.fillStyle=c.stars?'#ddeeff':'#FFD700';
  ctx.beginPath(); ctx.arc(W*.86,40,26,0,Math.PI*2); ctx.fill();
  if(c.stars){
    ctx.fillStyle=c.sky1;
    ctx.beginPath(); ctx.arc(W*.86+9,37,22,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Clouds
  clouds.forEach(cl=>drawCloud(cl.x,cl.y,cl.w,c.stars));

  // Grass
  ctx.fillStyle=c.grassCol; ctx.fillRect(0,ROAD_Y-8,W,22);

  // Road
  ctx.fillStyle=c.roadCol; ctx.fillRect(0,ROAD_Y,W,ROAD_H+22);

  // Lane dashes
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=3;
  ctx.setLineDash([30,20]); ctx.lineDashOffset=-roadOffset;
  for(let ln=1;ln<LANE_COUNT;ln++){
    ctx.beginPath(); ctx.moveTo(ln*LANE_W,ROAD_Y); ctx.lineTo(ln*LANE_W,ROAD_Y+ROAD_H+22); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.fillStyle='#FFD700';
  ctx.fillRect(0,ROAD_Y,W,4); ctx.fillRect(0,ROAD_Y+ROAD_H+17,W,4);

  // Platforms
  platforms.forEach(p=>drawPlatform(p));

  // Words
  wordSlots.forEach(ws=>{
    const wX=(ws.lane+.5)*LANE_W, wY=ROAD_Y+ws.y;
    if(ws.hit) ctx.globalAlpha=Math.max(0,1-ws.hitTimer/25);
    drawWord(wX,wY,ws.label,ws.isCorrect,ws.hit);
    ctx.globalAlpha=1;
  });

  // Trees
  trees.forEach(t=>drawTree(t.x,t.y,t.h,c.grassCol));

  // Bike
  drawBike(bike.visualX, ROAD_Y+ROAD_H*.5+bike.y, bike.tilt);

  // Shadow under bike if airborne
  if(bike.y < -5){
    const groundY = ROAD_Y+ROAD_H*.5;
    const alpha = Math.max(0,.5 - Math.abs(bike.y)/160);
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(bike.visualX, groundY+6, 22, 7, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Feedbacks
  feedbacks.forEach(f=>{
    ctx.globalAlpha=Math.min(1,f.life/20);
    ctx.font='bold 1.05rem Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillStyle=f.color; ctx.shadowBlur=8; ctx.shadowColor=f.color;
    ctx.fillText(f.text,f.x,f.y);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  });

  // Lane dots
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.arc((i+.5)*LANE_W, ROAD_Y-17, i===currentLane?7:4, 0, Math.PI*2);
    ctx.fillStyle=i===currentLane?'#FFD700':'rgba(255,255,255,0.3)'; ctx.fill();
  }

  drawUI();
  ctx.restore();
}

function drawPlatform(p){
  ctx.save();
  const x=p.x, y=p.screenY-PLAT_H, w=p.w, h=PLAT_H;

  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(x+5,y+h+4,w,9);

  // Body gradient
  const g=ctx.createLinearGradient(x,y,x,y+h);
  // Lighter top, darker bottom
  g.addColorStop(0, lighten(p.color, 40));
  g.addColorStop(1, p.color);
  ctx.fillStyle=g;
  roundRect(ctx,x,y,w,h,6); ctx.fill();

  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillRect(x+8,y+2,w-16,4);

  // Grip lines
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  for(let gx=x+14;gx<x+w-14;gx+=14){
    ctx.beginPath(); ctx.moveTo(gx,y+3); ctx.lineTo(gx,y+h-3); ctx.stroke();
  }

  // Jump hint text — only if platform is far away (x > W*0.5)
  if(p.x>W*.35){
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.font='bold 10px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText('▲ JUMP',x+w/2,y-5);
  }
  ctx.restore();
}

function lighten(hex, amount){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amount); g=Math.min(255,g+amount); b=Math.min(255,b+amount);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function drawCloud(x,y,w,dark){
  ctx.save();
  ctx.fillStyle=dark?'rgba(80,60,110,0.45)':'rgba(255,255,255,0.82)';
  const h=w*.4;
  ctx.beginPath();
  ctx.ellipse(x,y,w*.5,h*.5,0,0,Math.PI*2);
  ctx.ellipse(x-w*.25,y+h*.1,w*.3,h*.4,0,0,Math.PI*2);
  ctx.ellipse(x+w*.25,y+h*.1,w*.28,h*.38,0,0,Math.PI*2);
  ctx.fill(); ctx.restore();
}

function drawTree(x,y,h,grassCol){
  ctx.save();
  // Darken grass colour for tree
  ctx.fillStyle='#3d7a3d';
  ctx.beginPath(); ctx.moveTo(x,y-h); ctx.lineTo(x-h*.4,y); ctx.lineTo(x+h*.4,y); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#6b3a2a'; ctx.fillRect(x-5,y,10,14);
  ctx.restore();
}

function drawWord(x,y,text,isCorrect,hit){
  ctx.save();
  ctx.font='bold .92rem Nunito,sans-serif'; ctx.textAlign='center';
  const tw=ctx.measureText(text).width;
  const bw=Math.max(tw+28,82), bh=40;
  ctx.shadowBlur=10;
  ctx.shadowColor=hit?(isCorrect?'#00e676':'#ff1744'):'rgba(0,0,0,0.4)';
  ctx.fillStyle=hit?(isCorrect?'#00e676':'#ff4444'):(isCorrect?'#003399':'#444466');
  roundRect(ctx,x-bw/2,y-bh/2,bw,bh,10); ctx.fill();
  ctx.strokeStyle=hit?'#fff':(isCorrect?'#4488ff':'#8888aa'); ctx.lineWidth=2;
  roundRect(ctx,x-bw/2,y-bh/2,bw,bh,10); ctx.stroke();
  ctx.shadowBlur=0; ctx.fillStyle='#fff';
  ctx.fillText(text,x,y+6);
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawBike(x,y,tilt){
  ctx.save();
  ctx.translate(x,y); ctx.rotate(tilt); ctx.scale(1.1,1.1);
  ctx.strokeStyle='#222'; ctx.lineWidth=3;
  for(const wx of [-18,18]){
    ctx.beginPath(); ctx.arc(wx,10,16,0,Math.PI*2); ctx.stroke();
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2+frameCount*.12;
      ctx.beginPath(); ctx.moveTo(wx,10); ctx.lineTo(wx+Math.cos(a)*14,10+Math.sin(a)*14); ctx.stroke();
    }
  }
  ctx.strokeStyle='#003399'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(-18,10); ctx.lineTo(0,-12); ctx.lineTo(18,10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(-18,10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(-4,-24); ctx.stroke();
  ctx.fillStyle='#003399'; ctx.beginPath(); ctx.ellipse(-4,-26,10,4,-.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(18,10); ctx.lineTo(14,-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,-18); ctx.lineTo(20,-16); ctx.stroke();
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.ellipse(-1,-32,9,13,.4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#cc9900'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#FFDAB9'; ctx.beginPath(); ctx.arc(-2,-46,9,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#cc8866'; ctx.stroke();
  ctx.fillStyle='#cc2200';
  ctx.beginPath(); ctx.arc(-2,-46,9.5,Math.PI*1.1,Math.PI*1.95,false); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-10,-46); ctx.quadraticCurveTo(-18,-40,-14,-33); ctx.quadraticCurveTo(-10,-38,-9,-46); ctx.fill();
  ctx.fillStyle='#003399'; ctx.beginPath(); ctx.arc(-2,-46,9.5,Math.PI,0); ctx.fill();
  ctx.fillStyle='#4466cc'; ctx.fillRect(-11,-48,18,5);
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(2,-36); ctx.quadraticCurveTo(10,-28,15,-18); ctx.stroke();
  const la=Math.sin(frameCount*.18)*.5;
  ctx.strokeStyle='#003399'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(-8+Math.cos(la)*8,0+Math.sin(la)*6); ctx.lineTo(-18,10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(-8-Math.cos(la)*8,0-Math.sin(la)*6); ctx.lineTo(-18,10); ctx.stroke();
  ctx.restore();
}

function drawUI(){
  const c=cfg();
  ctx.save();
  ctx.fillStyle=c.color; ctx.fillRect(0,0,W,UI_H);
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(0,UI_H,W,4);

  // Level badge
  ctx.fillStyle=lighten(c.color,60);
  roundRect(ctx,W-96,7,84,28,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 12px Nunito,sans-serif'; ctx.textAlign='center';
  ctx.fillText('LVL '+(levelIdx+1)+'/10',W-54,26);

  // Progress bar toward next level
  const barW=110, barH=8, bx=W/2-barW/2, by=UI_H-20;
  const prog = Math.min(correctInLevel/ANSWERS_PER_LEVEL,1);
  ctx.fillStyle='rgba(255,255,255,0.12)'; roundRect(ctx,bx,by,barW,barH,4); ctx.fill();
  ctx.fillStyle='#FFD700'; roundRect(ctx,bx,by,barW*prog,barH,4); ctx.fill();
  ctx.fillStyle='rgba(200,220,255,0.7)'; ctx.font='9px Nunito'; ctx.textAlign='center';
  ctx.fillText('Next level: '+correctInLevel+'/'+ANSWERS_PER_LEVEL,W/2,by-3);

  // Question
  const qText=currentQ?currentQ.q:'Loading…';
  const qSize=Math.min(34,W*.052);
  ctx.font='bold '+qSize+'px Fredoka One,cursive';
  ctx.textAlign='center'; ctx.fillStyle='#FFD700';
  ctx.shadowBlur=4; ctx.shadowColor='rgba(0,0,0,0.5)';
  wrapText(ctx,qText,W/2,32,W-210,qSize+10);
  ctx.shadowBlur=0;

  // Score / streak / lives
  ctx.font='bold 13px Nunito,sans-serif'; ctx.textAlign='left';
  ctx.fillStyle='rgba(200,220,255,0.8)'; ctx.fillText('Score:',12,UI_H-10);
  ctx.fillStyle='#fff'; ctx.fillText(score,58,UI_H-10);
  ctx.fillStyle='rgba(200,220,255,0.8)'; ctx.fillText('Streak:',W/2-52,UI_H-10);
  ctx.fillStyle=streak>0?'#FFD700':'#fff'; ctx.fillText('🔥 '+streak,W/2+12,UI_H-10);
  ctx.font='14px sans-serif'; ctx.textAlign='right';
  ctx.fillText('❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives)),W-14,UI_H-10);
  ctx.restore();
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' '); let line='',lineY=y;
  for(let i=0;i<words.length;i++){
    const test=line+words[i]+' ';
    if(ctx.measureText(test).width>maxW&&i>0){ ctx.fillText(line.trim(),x,lineY); line=words[i]+' '; lineY+=lineH; }
    else line=test;
  }
  ctx.fillText(line.trim(),x,lineY);
}

function showGameOver(){
  cancelAnimationFrame(animId);
  const maxLevel = levelIdx+1;
  overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>💥 Game Over!</h1>
    <div style="font-family:'Fredoka One',cursive;font-size:2rem;color:#00e676;">Score: ${score}</div>
    <p>Best streak: ${streak} 🔥<br>
    Reached: <strong>Level ${maxLevel}/10 — ${LEVEL_CONFIG[levelIdx].name.replace(/^L\d+: /,'')}</strong><br>
    ${maxLevel===10?'🏆 You completed all 10 levels — incredible!':'Keep practising your CS knowledge!'}</p>
    <button class="btn" onclick="restartGame()">Ride Again!</button>
  `;
}

function restartGame(){ startGame(); }

// Draw title screen on load
(function drawTitle(){
  resize();
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#4fa8d8'); sky.addColorStop(1,'#b8e0f7');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#5aad5a'; ctx.fillRect(0,H-Math.min(170,H*.29)-28,W,20);
  ctx.fillStyle='#666'; ctx.fillRect(0,H-Math.min(170,H*.29)-20,W,Math.min(170,H*.29)+20);
  ctx.fillStyle='#FFD700'; ctx.fillRect(0,H-Math.min(170,H*.29)-20,W,4);
})();
</script>
